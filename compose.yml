services:
  api:
    cpus: 0.4
    build:
      context: .
      dockerfile: Dockerfile
    container_name: jitumeai_server
    restart: always
    env_file:
      - server/.env
    depends_on:
      - db
      # - redis
    ports:
      - "8000:8000"
    networks:
      - backend
    develop:
      watch:
        - action: sync
          path: .
          target: /

  db:
    image: postgres:15
    container_name: jitumeai_postgres_db
    environment:
      - "POSTGRES_HOST_AUTH_METHOD=trust"
    cpus: 0.4
    restart: always
    env_file:
      - server/.env
    volumes:
      - postgres_data:/var/lib/postgresql/data
    # networks:
    #   - backend

  # redis:
  #   image: redis:7
  #   container_name: writeplanai_redis_cache
  #   cpus: 0.2
  #   restart: always
  #   volumes:
  #     - redis_data:/data
  #   networks:
  #     - backend

volumes:
  postgres_data:
  # redis_data:
  
networks:
  backend:
    driver: bridge